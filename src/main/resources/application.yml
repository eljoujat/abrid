# ---------------------------------------------------------------------------
# application.yml — configuration Spring Boot, tous profils
# ---------------------------------------------------------------------------

spring:
  threads:
    virtual:
      enabled: true

  # ---------------------------------------------------------------------------
  # Base de données PostgreSQL (production + dev local avec docker-compose)
  # Surcharge par application-test.yml pour les tests unitaires (H2)
  # ---------------------------------------------------------------------------
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:abrid}
    username: ${DB_USER:abrid}
    password: ${DB_PASSWORD:abrid}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ---------------------------------------------------------------------------
  # Flyway — migrations au démarrage (idempotent)
  # Deux emplacements : commun + spécifique PostgreSQL (PostGIS)
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration/postgresql
    baseline-on-migrate: false
    out-of-order: false

# ---------------------------------------------------------------------------
# Source GTFS
# ---------------------------------------------------------------------------
gtfs:
  source:
    url: ${GTFS_URL:https://github.com/newsbubbles/rail_maroc_oncf/raw/main/oncf_gtfs.zip}
  ssl:
    trust-all: ${GTFS_SSL_TRUST_ALL:false}
  proxy:
    url: ${HTTPS_PROXY:${HTTP_PROXY:}}
    user: ${PROXY_USER:}
    password: ${PROXY_PASSWORD:}
  download:
    connect-timeout: ${GTFS_CONNECT_TIMEOUT:30}
    read-timeout: ${GTFS_READ_TIMEOUT:120}
  respect-feed-dates: ${RESPECT_FEED_DATES:false}

# ---------------------------------------------------------------------------
# Application — ingestion et worker
# ---------------------------------------------------------------------------
app:
  ingest-on-startup: ${INGEST_ON_STARTUP:false}
  worker-mode: ${WORKER_MODE:false}
  worker:
    # Cron d'ingestion périodique (3h du matin par défaut)
    cron: ${WORKER_CRON:0 0 3 * * *}
    # Seuil minimum de couverture (%) pour accepter une ingestion
    coverage-threshold: ${COVERAGE_THRESHOLD:50}
  # OpenTripPlanner 2.x
  otp:
    enabled: ${OTP_ENABLED:false}
    base-url: ${OTP_URL:http://otp:8080}
    connect-timeout-ms: ${OTP_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${OTP_READ_TIMEOUT_MS:10000}
    gtfs-feed-id: ${OTP_FEED_ID:1}
    timezone: ${OTP_TIMEZONE:Africa/Casablanca}

# ---------------------------------------------------------------------------
# Resilience4j — circuit breaker OTP
# ---------------------------------------------------------------------------
resilience4j:
  circuitbreaker:
    instances:
      otp:
        # Ouvre le circuit après 50% d'échecs sur 5 appels
        sliding-window-size: 5
        failure-rate-threshold: 50
        # Attend 30s avant de retenter (half-open)
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        # Exceptions déclenchant le circuit (toutes sauf NoDataException)
        record-exceptions:
          - java.lang.Exception
        ignore-exceptions:
          - ma.mobility.abrid.core.search.NoDataException
  timelimiter:
    instances:
      otp:
        timeout-duration: ${OTP_TIMEOUT_MS:8000}ms

# ---------------------------------------------------------------------------
# Serveur
# ---------------------------------------------------------------------------
server:
  port: ${PORT:8080}

# ---------------------------------------------------------------------------
# Actuator : exposer health + metrics + prometheus
# ---------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: abrid

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level:
    ma.mobility.abrid: INFO
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"
