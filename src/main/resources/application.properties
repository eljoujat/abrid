# ---------------------------------------------------------------------------
# Base de données SQLite (dev) — remplacer par PostgreSQL au Lot 1
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:sqlite:${DB_PATH:./data/oncf.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-timeout=30000
spring.sql.init.mode=never

# ---------------------------------------------------------------------------
# Source GTFS
# ---------------------------------------------------------------------------
gtfs.source.url=${GTFS_URL:https://github.com/newsbubbles/rail_maroc_oncf/raw/main/oncf_gtfs.zip}
gtfs.respect-feed-dates=${RESPECT_FEED_DATES:false}

# ---------------------------------------------------------------------------
# Ingestion
# ---------------------------------------------------------------------------
INGEST_ON_STARTUP=${INGEST_ON_STARTUP:false}
WORKER_MODE=${WORKER_MODE:false}

# ---------------------------------------------------------------------------
# Serveur
# ---------------------------------------------------------------------------
server.port=${PORT:8080}

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging.level.ma.mobility.abrid=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
