# src/test/resources/application.properties
# Configuration de base pour tous les tests unitaires (pas les tests Testcontainers)
# Surcharge application.yml : utilise H2 in-memory pour les tests rapides

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=5000

# Désactiver Flyway pour les tests unitaires (H2 2.2.224 > version testée par Flyway 10.x)
# Les migrations Flyway sont testées via Testcontainers (PostgreSQL réel)
spring.flyway.enabled=false

# Initialisation du schéma via Spring JDBC (compatible H2 MODE=PostgreSQL)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/test-schema.sql

# Désactiver l'ingestion et le worker
app.ingest-on-startup=false
app.worker-mode=false
app.worker.coverage-threshold=0

# GTFS
gtfs.respect-feed-dates=false
