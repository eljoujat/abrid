version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/data/oncf.db
      - RESPECT_FEED_DATES=${RESPECT_FEED_DATES:-false}
    volumes:
      - data:/data
    depends_on:
      worker:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    command: python -m scripts.ingest --db /data/oncf.db
    environment:
      - GTFS_URL=${GTFS_URL:-https://github.com/newsbubbles/rail_maroc_oncf/raw/main/oncf_gtfs.zip}
    volumes:
      - data:/data
    restart: "no"

volumes:
  data:
